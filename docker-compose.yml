version: '3.8'

services:
  # Backend API
  app:
    build: .
    container_name: zumba-crm-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./crm.db
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-jwt-secret-key}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET:-}
    volumes:
      - ./data:/app/data
    networks:
      - zumba-network
    depends_on:
      - nginx

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: zumba-crm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - zumba-network
    depends_on:
      - app

  # Database (SQLite - file based, no container needed)
  # For PostgreSQL, uncomment below:
  # db:
  #   image: postgres:15-alpine
  #   container_name: zumba-crm-db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: zumba_crm
  #     POSTGRES_USER: zumba
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-zumba123}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - zumba-network

volumes:
  # postgres_data:
  data:

networks:
  zumba-network:
    driver: bridge
