[alembic]
# Путь к скриптам миграций
script_location = alembic

# Предфикс для файлов миграций
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# Синхронизация файлов migration
prepend_sys_path = .

# URL базы данных для миграций
# Заменяется через env.py
# sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Форматирование кода после создания миграции
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

# Логирование
version_path_separator = os

# Название ветки
# branch_label = 

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
